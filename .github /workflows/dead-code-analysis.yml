name: 🔍 Dead Code Analysis

on:
  workflow_dispatch:  # Manual trigger from browser

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ── KNIP: Best dead code finder for Next.js ──
      - name: Run Knip Analysis
        run: |
          npx knip --no-exit-code > knip_report.txt 2>&1 || true
          echo "## 🔍 Knip Dead Code Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -s knip_report.txt ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat knip_report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No dead code found by Knip" >> $GITHUB_STEP_SUMMARY
          fi

      # ── FIND UNREFERENCED FILES ──
      - name: Find orphaned files
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📁 Potentially Orphaned Files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          for file in $(find app lib -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \) \
            ! -name "layout.tsx" \
            ! -name "page.tsx" \
            ! -name "loading.tsx" \
            ! -name "error.tsx" \
            ! -name "not-found.tsx" \
            ! -name "middleware.ts" \
            ! -name "route.ts" \
            ! -name "next-env.d.ts" \
            ! -path "*/api/*"); do

            name=$(basename "$file" | sed 's/\.[^.]*$//')

            refs=$(grep -rl "$name" app/ lib/ \
              --include="*.ts" \
              --include="*.tsx" \
              --include="*.js" \
              --include="*.jsx" \
              2>/dev/null | grep -v "$file" | wc -l)

            if [ "$refs" -eq 0 ]; then
              echo "⚠️  POSSIBLY DEAD: $file (0 references found)" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── FIND UNUSED IMAGES/ASSETS ──
      - name: Find unused public assets
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🖼️ Potentially Unused Public Assets" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          for file in $(find public -type f 2>/dev/null); do
            filename=$(basename "$file")

            refs=$(grep -rl "$filename" app/ lib/ *.ts *.tsx *.js *.mjs *.json \
              --include="*.ts" \
              --include="*.tsx" \
              --include="*.js" \
              --include="*.jsx" \
              --include="*.json" \
              --include="*.css" \
              --include="*.md" \
              2>/dev/null | wc -l)

            if [ "$refs" -eq 0 ]; then
              echo "⚠️  POSSIBLY UNUSED: $file" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── FIND UNUSED DEPENDENCIES ──
      - name: Check unused npm dependencies
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Potentially Unused Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Get dependencies from package.json
          deps=$(node -e "
            const pkg = require('./package.json');
            const all = [
              ...Object.keys(pkg.dependencies || {}),
              ...Object.keys(pkg.devDependencies || {})
            ];
            all.forEach(d => console.log(d));
          ")

          for dep in $deps; do
            # Skip known framework deps
            if [[ "$dep" == "next" || "$dep" == "react" || "$dep" == "react-dom" || \
                  "$dep" == "typescript" || "$dep" == "autoprefixer" || \
                  "$dep" == "postcss" || "$dep" == "tailwindcss" || \
                  "$dep" == "@types/"* || "$dep" == "eslint"* ]]; then
              continue
            fi

            refs=$(grep -rl "$dep" app/ lib/ middleware.ts \
              --include="*.ts" \
              --include="*.tsx" \
              --include="*.js" \
              --include="*.jsx" \
              2>/dev/null | wc -l)

            if [ "$refs" -eq 0 ]; then
              echo "⚠️  $dep (not imported in any source file)" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── FIND UNUSED TAILWIND CLASSES ──
      - name: Check for inline styles (potential Tailwind bypass)
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎨 Style Issues" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          grep -rn "style={{" app/ lib/ \
            --include="*.tsx" \
            --include="*.jsx" \
            2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "None found" >> $GITHUB_STEP_SUMMARY

          echo '```' >> $GITHUB_STEP_SUMMARY

      # ── SUSPICIOUS FILES ──
      - name: Flag suspicious files
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚩 Suspicious / Test Files in Root" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          for file in $(find . -maxdepth 1 -type f \( \
            -name "test*" -o \
            -name "temp*" -o \
            -name "tmp*" -o \
            -name "*.bak" -o \
            -name "*.old" -o \
            -name "debug*" \
          \)); do
            echo "⚠️  SUSPICIOUS: $file" >> $GITHUB_STEP_SUMMARY
          done

          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: dead-code-report
          path: knip_report.txt
