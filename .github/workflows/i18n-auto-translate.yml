name: 🌍 Auto-translate missing i18n keys

# Runs automatically whenever a push to main touches the English locale
# or the Translations type interface — i.e. whenever new copy is added.
#
# What it does:
#   1. Detects missing translation keys across all 5 non-English locales
#   2. Calls Groq to translate them (same model the app uses for reflections)
#   3. Commits the filled translations back to main
#   4. Vercel picks up the commit and redeploys automatically
#
# Net result: new English strings are live in all 6 languages within ~2 minutes
# of merging a PR, with zero manual steps.
#
# Loop prevention: the commit message includes [skip ci] so this workflow
# does not trigger itself when it pushes the translation commit.

on:
  push:
    branches:
      - main
    paths:
      # Only run when English copy or the type interface changes
      - 'app/lib/i18n/en.ts'
      - 'app/lib/i18n/types.ts'

jobs:
  translate:
    name: Fill missing translations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Grant the GITHUB_TOKEN write access to push the translation commit
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN — has write access with contents: write above
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so git push works correctly
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Needs Node 18+ for built-in fetch(); use 22 to match dead-code workflow
          node-version: '22'

      - name: Check for missing translations (audit)
        id: audit
        run: |
          echo "Running i18n audit..."
          node scripts/i18n-sync.mjs 2>&1 | tee audit.log

          # Capture whether anything is missing
          if grep -q "missing key" audit.log; then
            echo "missing=true" >> $GITHUB_OUTPUT
            echo "⚠️  Missing translations detected — will auto-translate."
          else
            echo "missing=false" >> $GITHUB_OUTPUT
            echo "✅ All locales already in sync — nothing to do."
          fi

      - name: Translate missing keys via Groq
        if: steps.audit.outputs.missing == 'true'
        env:
          GROQAPIKEY: ${{ secrets.GROQAPIKEY }}
        run: |
          echo "Translating missing keys..."
          node scripts/i18n-sync.mjs --write 2>&1 | tee translate.log

          echo ""
          echo "Translation complete. Changed files:"
          git diff --name-only app/lib/i18n/

      - name: Commit and push translations
        if: steps.audit.outputs.missing == 'true'
        run: |
          # Check if the script actually produced any changes
          if git diff --quiet app/lib/i18n/; then
            echo "No file changes after translation — nothing to commit."
            exit 0
          fi

          # Configure git identity for the commit
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the locale files (never touch anything else)
          git add app/lib/i18n/uk.ts \
                  app/lib/i18n/ar.ts \
                  app/lib/i18n/fr.ts \
                  app/lib/i18n/nl.ts \
                  app/lib/i18n/ro.ts

          # Count how many keys were added (for the commit message)
          ADDED=$(git diff --cached --unified=0 | grep "^+" | grep -v "^+++" | grep -c "EN:" || echo "?")

          git commit -m "chore(i18n): auto-translate ${ADDED} missing key(s) into 5 locales [skip ci]

          Triggered by push to main that modified en.ts or types.ts.
          Translations generated by Groq (llama-4-scout-17b-16e-instruct).
          Review: git show HEAD -- app/lib/i18n/"

          git push origin main
          echo "✅ Translation commit pushed to main. Vercel will redeploy automatically."

      - name: Summary
        if: always()
        run: |
          echo "## 🌍 i18n Auto-translate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f audit.log ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat audit.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f translate.log ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Translations written" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat translate.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
