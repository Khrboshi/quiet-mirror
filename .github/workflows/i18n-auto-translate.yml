name: 🌍 Auto-translate missing i18n keys

# Runs automatically whenever a push to main touches the English locale
# or the Translations type interface — i.e. whenever new copy is added.
#
# What it does:
#   1. Detects missing translation keys across all 5 non-English locales
#      (uses exit code 2 = missing, 0 = all in sync — no log-scraping)
#   2. Calls Groq to translate them (same model the app uses for reflections)
#   3. Commits the filled translations back to main via a glob pattern
#      so new locales are picked up automatically without editing this file
#   4. Vercel picks up the commit and redeploys automatically
#
# Net result: new English strings are live in all 6 languages within ~2 minutes
# of merging a PR, with zero manual steps.
#
# Loop prevention: the commit message includes [skip ci] so this workflow
# does not trigger itself when it pushes the translation commit.

on:
  push:
    branches:
      - main
    paths:
      - 'app/lib/i18n/en.ts'
      - 'app/lib/i18n/types.ts'

jobs:
  translate:
    name: Fill missing translations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check for missing translations
        id: audit
        # Exit code semantics (set by scripts/i18n-sync.mjs):
        #   0 = all locales in sync — nothing to do
        #   2 = missing keys found — proceed to translate
        #   1 = unexpected error — fail the job
        run: |
          set +e
          node scripts/i18n-sync.mjs 2>&1 | tee audit.log
          EXIT=$?
          set -e

          echo "Script exit code: $EXIT"

          if [ "$EXIT" -eq 0 ]; then
            echo "missing=false" >> $GITHUB_OUTPUT
            echo "✅ All locales already in sync — nothing to do."
          elif [ "$EXIT" -eq 2 ]; then
            echo "missing=true" >> $GITHUB_OUTPUT
            echo "⚠️  Missing translations detected — will auto-translate."
          else
            echo "❌ i18n-sync.mjs exited with unexpected code $EXIT — failing."
            exit $EXIT
          fi

      - name: Translate missing keys via Groq
        if: steps.audit.outputs.missing == 'true'
        env:
          GROQAPIKEY: ${{ secrets.GROQAPIKEY }}
        run: |
          echo "Translating missing keys..."
          node scripts/i18n-sync.mjs --write 2>&1 | tee translate.log

          echo ""
          echo "Translation complete. Changed locale files:"
          git diff --name-only app/lib/i18n/

      - name: Commit and push translations
        if: steps.audit.outputs.missing == 'true'
        run: |
          if git diff --quiet app/lib/i18n/; then
            echo "No locale file changes after translation — nothing to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Glob pattern — automatically includes any new locale files
          # without needing to edit this workflow.
          git add app/lib/i18n/*.ts

          # Restore en.ts and types.ts — only locale translations should be committed
          git restore --staged app/lib/i18n/en.ts app/lib/i18n/types.ts 2>/dev/null || true

          ADDED=$(git diff --cached --unified=0 | grep -c "^+" || echo "?")

          git commit -m "chore(i18n): auto-translate missing keys into 5 locales [skip ci]

          Triggered by: ${{ github.event.head_commit.message }}
          Translations generated by Groq (llama-4-scout-17b-16e-instruct).
          Lines added: ${ADDED}
          Review: git show HEAD -- 'app/lib/i18n/'"

          git push origin main
          echo "✅ Translation commit pushed. Vercel will redeploy automatically."

      - name: Job summary
        if: always()
        run: |
          echo "## 🌍 i18n Auto-translate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f audit.log ]; then
            echo "### Audit" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat audit.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f translate.log ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Translations written" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat translate.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
