name: 🔤 Weekly i18n grammar & translation check

# Runs every Sunday at 02:00 UTC — off-peak, before the week starts.
# Also manually triggerable from the Actions tab.
#
# What it does:
#   1. Checks grammar & translation quality across all 5 non-English locales
#   2. If corrections found → opens a PR with all fixes for review
#   3. PR includes a full before/after report for every change
#   4. You review and merge — Vercel redeploys automatically
#   5. Nothing needs fixing → job completes silently with a green tick
#
# Why a PR instead of a direct push:
#   Grammar corrections overwrite existing human-reviewed translations.
#   A PR gives you one-click visibility before anything goes live.

on:
  schedule:
    - cron: '0 2 * * 0'   # Every Sunday at 02:00 UTC
  workflow_dispatch:
    inputs:
      lang:
        description: 'Check a single locale only (leave blank for all: uk/ar/fr/nl/ro)'
        required: false
        default: ''
      dry_run:
        description: 'Dry run — report only, no file changes or PR'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  grammar-check:
    name: Check grammar & translation quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run grammar & translation check
        id: check
        env:
          GROQAPIKEY: ${{ secrets.GROQAPIKEY }}
        run: |
          set +e

          ARGS=""
          if [ -n "${{ github.event.inputs.lang }}" ]; then
            ARGS="--lang ${{ github.event.inputs.lang }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          node scripts/i18n-grammar-check.mjs $ARGS 2>&1 | tee grammar.log
          EXIT=$?
          set -e

          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT

          # Exit code semantics (set by scripts/i18n-grammar-check.mjs):
          #   0 = all correct, nothing to change
          #   2 = corrections applied to locale files
          #   1 = unexpected error
          if [ "$EXIT" -eq 0 ]; then
            echo "corrections=false" >> $GITHUB_OUTPUT
            echo "All translations correct — no PR needed."
          elif [ "$EXIT" -eq 2 ]; then
            echo "corrections=true" >> $GITHUB_OUTPUT
            echo "Corrections found — will open a PR."
          else
            echo "Script failed with exit code $EXIT"
            exit $EXIT
          fi

      - name: Count corrections
        if: steps.check.outputs.corrections == 'true'
        id: counts
        run: |
          TOTAL=$(grep -c "^### \`" corrections-report.md || echo "0")
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      - name: Open PR with corrections
        if: steps.check.outputs.corrections == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="chore/i18n-grammar-${DATE}"
          TOTAL="${{ steps.counts.outputs.total }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          # Stage all locale files (glob — picks up any future locales automatically)
          git add app/lib/i18n/*.ts corrections-report.md

          # en.ts is never modified by grammar check — restore it from staging just in case
          git restore --staged app/lib/i18n/en.ts 2>/dev/null || true

          git commit -m "chore(i18n): grammar & translation corrections — ${TOTAL} fix(es)

          Weekly automated check via Groq (llama-4-scout-17b-16e-instruct).
          See corrections-report.md for full before/after details per key.
          Review each change carefully before merging."

          git push origin "$BRANCH"

          REPORT=$(cat corrections-report.md)

          gh pr create \
            --title "chore(i18n): weekly grammar corrections — ${TOTAL} fix(es)" \
            --body "## Automated grammar & translation corrections

          Found **${TOTAL} correction(s)** across the non-English locale files.

          Generated by Groq (\`llama-4-scout-17b-16e-instruct\`) on $(date -u +%Y-%m-%d).

          ## Before merging
          - Check the **Files changed** tab — review every before/after pair
          - Edit any correction directly on this branch if something looks wrong
          - Merge when satisfied — Vercel redeploys automatically

          ## Full correction report

          ${REPORT}" \
            --base main \
            --head "$BRANCH"

      - name: Job summary
        if: always()
        run: |
          echo "## 🔤 i18n Grammar & Translation Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f grammar.log ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat grammar.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f corrections-report.md ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            cat corrections-report.md >> $GITHUB_STEP_SUMMARY
          fi
