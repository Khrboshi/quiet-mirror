# .sourcery.yaml
# Sourcery configuration for Quiet Mirror
# Stack: Next.js 15 (App Router) · TypeScript · Tailwind CSS
# https://docs.sourcery.ai/Configuration/

rule_settings:
  default_severity: warning

ignore:
  # ── False positive: dangerouslySetInnerHTML ───────────────────────────────────
  # Used exclusively for JSON-LD structured data <script> injection (SEO pattern).
  # Data source: app/blog/articles.ts — hardcoded static TypeScript file.
  # No user input, no database content, no external data. Zero XSS surface.
  - rule: react/no-danger
    path: app/blog/[slug]/page.tsx

  # ── False positive: LGPL license on sharp platform binaries ──────────────────
  # LGPL-3.0 requires open-sourcing modifications to the LGPL library itself,
  # not the application that dynamically links to it.
  # Scoped to specific assessed packages — new LGPL findings elsewhere still surface.
  - rule: license/lgpl
    path: node_modules/@img/sharp-libvips-darwin-arm64
  - rule: license/lgpl
    path: node_modules/@img/sharp-libvips-linux-x64
  - rule: license/lgpl
    path: node_modules/@img/sharp-libvips-linux-arm64
  - rule: license/lgpl
    path: node_modules/@img/sharp-libvips-linuxmusl-x64

# No security.ignore block — all previously ignored advisories have been
# resolved by the Next.js 15 upgrade and the resulting transitive bumps
# (picomatch ≥ 2.3.2 / ≥ 4.0.4, yaml ≥ 2.8.3, next ≥ 15.5.15). New advisories
# will surface normally; add a fresh block only when genuinely needed.
